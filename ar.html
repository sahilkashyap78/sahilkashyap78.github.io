<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MarkerVideo AR</title>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    a-scene { width: 100vw; height: 100vh; }

    /* ── Splash / Error panels ── */
    .panel {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding: 32px;
      background: #000; color: #fff; text-align: center;
    }
    .panel[hidden] { display: none; }
    .panel p   { color: #aaa; font-size: 0.9rem; max-width: 300px; line-height: 1.6; }
    .panel h2  { font-size: 1.1rem; font-weight: 600; }
    .btn {
      padding: 16px 40px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      color: #fff; font-size: 1rem; font-weight: 700;
      border: none; border-radius: 14px; cursor: pointer;
    }

    /* ── Floating back / mute buttons ── */
    #ui-btns {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 500; pointer-events: none;
    }
    #ui-btns[hidden] { display: none; }

    #btn-back, #btn-unmute {
      position: absolute; top: 16px; pointer-events: all;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px; color: #fff;
      font-size: 0.85rem; padding: 9px 14px;
      cursor: pointer; text-decoration: none;
    }
    #btn-back   { left: 16px; }
    #btn-unmute { right: 16px; }
  </style>
</head>
<body>

  <!-- Step 1: Start splash -->
  <div id="panel-start" class="panel">
    <button id="btn-start" class="btn">Start AR Camera</button>
    <p>Tap to open the camera, then point it at the marker card</p>
  </div>

  <!-- Step 2: Camera denied or other error -->
  <div id="panel-error" class="panel" hidden>
    <h2>Camera Error</h2>
    <p id="err-msg">Could not access camera.</p>
    <p>Go to browser Settings → Site Permissions → Camera, allow access, then reload.</p>
    <button class="btn" onclick="location.reload()">Try Again</button>
  </div>

  <!-- A-Frame / MindAR scene is injected here -->
  <div id="ar-mount"></div>

  <!-- Floating buttons (appear once camera starts) -->
  <div id="ui-btns" hidden>
    <a href="index.html" id="btn-back">&#8592; Back</a>
    <button id="btn-unmute">&#128263; Unmute</button>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    let muted = true;

    $('btn-unmute').addEventListener('click', () => {
      const v = $('vid');
      if (!v) return;
      muted = !muted;
      v.muted = muted;
      $('btn-unmute').textContent = muted ? '🔇 Unmute' : '🔊 Muted';
    });

    $('btn-start').addEventListener('click', async () => {
      $('panel-start').hidden = true;

      // Ask for camera inside the tap — this is the user gesture iOS Safari needs
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' },
          audio: false
        });
        stream.getTracks().forEach(t => t.stop()); // release test stream; MindAR opens its own
      } catch (e) {
        $('panel-error').hidden = false;
        $('err-msg').textContent =
          e.name === 'NotAllowedError' ? 'Camera access was denied.' :
          e.name === 'NotFoundError'   ? 'No camera found on this device.' :
                                         'Camera error: ' + e.name;
        return;
      }

      // Show floating buttons straight away
      $('ui-btns').hidden = false;

      // Inject the AR scene — MindAR shows its own LOADING → SCANNING UI
      // We don't override it, so the user always sees what stage things are at
      $('ar-mount').innerHTML = `
        <a-scene
          mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind"
          color-space="sRGB"
          renderer="colorManagement: true, physicallyCorrectLights: true"
          vr-mode-ui="enabled: false"
          device-orientation-permission-ui="enabled: false"
        >
          <a-assets timeout="5000">
            <video id="vid"
              src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4"
              preload="auto" loop muted playsinline crossorigin="anonymous">
            </video>
          </a-assets>

          <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

          <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#vid" width="1" height="0.630" position="0 0 0"></a-video>
          </a-entity>
        </a-scene>
      `;

      const scene = $('ar-mount').querySelector('a-scene');

      // Wire up video play/pause once the scene is ready
      scene.addEventListener('loaded', () => {
        const vid    = $('vid');
        const target = scene.querySelector('[mindar-image-target]');

        target.addEventListener('targetFound', () => vid && vid.play().catch(() => {}));
        target.addEventListener('targetLost',  () => vid && vid.pause());
      });

      // Safety net: if nothing loads in 20 s, tell the user
      const giveUp = setTimeout(() => {
        if (!$('panel-error').hidden) return; // already showing error
        $('panel-error').hidden = false;
        $('err-msg').textContent = 'AR took too long to load. Check your internet connection and try again.';
        $('ui-btns').hidden = true;
      }, 20000);

      scene.addEventListener('loaded', () => clearTimeout(giveUp), { once: true });
    });
  </script>
</body>
</html>
